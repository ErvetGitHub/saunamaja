      rel="stylesheet"
    />
    <link rel="stylesheet" href="colors_and_type.css" />

    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      html {
        -webkit-text-size-adjust: 100%;
      }
      body {
        background: var(--night);
        font-family: var(--font-body);
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        overflow-x: hidden;
      }
      img {
        display: block;
      }
      button {
        font-family: inherit;
      }
      ::selection {
        background: var(--ember);
        color: var(--on-ember);
      }

      /* Button interactions */
      .ms-btn {
        will-change: transform;
      }
      .ms-btn--primary:hover,
      .ms-btn--solid:hover {
        filter: brightness(1.06);
      }
      .ms-btn--ghost:hover {
        background: color-mix(
          in srgb,
          currentColor 12%,
          transparent
        ) !important;
        border-color: color-mix(
          in srgb,
          currentColor 48%,
          transparent
        ) !important;
      }
      .ms-btn:active {
        transform: scale(0.965);
      }
      .ms-opt:hover {
        border-color: var(--ink-faint) !important;
      }

      /* Nav-link animated underline */
      .ms-navlink {
        position: relative;
      }
      .ms-navlink::after {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: -6px;
        height: 1.5px;
        background: var(--nav-underline, var(--ember));
        border-radius: 2px;
        transform: scaleX(0);
        transform-origin: left center;
        transition: transform 0.35s var(--ease);
      }
      .ms-navlink:hover {
        opacity: 1 !important;
      }
      .ms-navlink:hover::after {
        transform: scaleX(1);
      }

      /* Scroll cue bounce */
      @keyframes ms-bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(6px);
        }
      }
      .ms-scrollcue {
        display: inline-flex;
        animation: ms-bounce 2.2s var(--ease) infinite;
      }

      /* Hero continuous ken-burns drift */
      @keyframes ms-kenburns {
        0% {
          transform: scale(1.04) translate(0, 0);
        }
        100% {
          transform: scale(1.16) translate(-1.6%, -1.4%);
        }
      }
      .ms-hero-img {
        animation: ms-kenburns 32s var(--ease-soft) infinite alternate;
        will-change: transform;
      }

      @media (prefers-reduced-motion: reduce) {
        .ms-scrollcue {
          animation: none;
        }
        .ms-hero-img {
          animation: none;
          transform: scale(1.06);
        }
        * {
          scroll-behavior: auto !important;
        }
      }

      /* Modal animations */
      @keyframes ms-fade {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes ms-pop {
        from {
          opacity: 0;
          transform: translateY(16px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }

      .ms-gtile img {
        transition: transform 1s var(--ease);
      }
      .ms-gtile:hover img {
        transform: scale(1.05);
      }
      .ms-gtile-zoom {
        opacity: 0;
        transform: scale(0.9);
        transition:
          opacity 0.35s var(--ease),
          transform 0.35s var(--ease);
      }
      .ms-gtile:hover .ms-gtile-zoom {
        opacity: 1;
        transform: scale(1);
      }

      /* ---------- Responsive ---------- */
      @media (max-width: 880px) {
        .ms-desktop-nav {
          display: none !important;
        }
        .ms-burger {
          display: flex !important;
        }
        .ms-config-grid {
          grid-template-columns: 1fr !important;
        }
        .ms-summary {
          position: static !important;
        }
      }
      @media (max-width: 820px) {
        .ms-story-grid {
          grid-template-columns: 1fr !important;
          gap: 40px !important;
        }
        .ms-gallery {
          grid-template-columns: 1fr 1fr !important;
        }
      }
      @media (max-width: 760px) {
        .ms-models-grid {
          grid-template-columns: 1fr !important;
        }
        .ms-footer-grid {
          grid-template-columns: 1fr !important;
          gap: 32px !important;
        }
        .ms-values {
          grid-template-columns: 1fr !important;
          gap: 26px !important;
        }
      }
      @media (max-width: 1080px) {
        .ms-hero-glass {
          display: none !important;
        }
      }
      @media (max-width: 560px) {
        .ms-gallery {
          grid-template-columns: 1fr !important;
        }
        .ms-form-grid {
          grid-template-columns: 1fr !important;
        }
      }
    </style>
