const { useState, useEffect, useRef } = React;

const Button = ({ children, variant = "primary", onDark = false, onClick, style = {}, type = "button" }) => {
  const base = {
    fontFamily: "var(--font-body)", fontSize: 15, fontWeight: 600, letterSpacing: "0.01em",
    border: "none", borderRadius: "var(--r-pill)", padding: "14px 26px", cursor: "pointer",
    display: "inline-flex", alignItems: "center", gap: 9, transition: "all .35s var(--ease)",
    lineHeight: 1, ...style,
  };
  const variants = {
    primary: { background: "var(--ember)", color: "var(--on-ember)" },
    ghost: {
      background: "transparent",
      color: onDark ? "var(--on-dark)" : "var(--ink)",
      border: `1px solid ${onDark ? "var(--line-dark)" : "var(--line-light)"}`,
    },
    solid: { background: onDark ? "var(--bone)" : "var(--ink)", color: onDark ? "var(--ink)" : "var(--bone)" },
  };
  return <button type={type} className={`ms-btn ms-btn--${variant}`} onClick={onClick} style={{ ...base, ...variants[variant] }}>{children}</button>;
};

const Eyebrow = ({ children, onDark = false, style = {} }) => (
  <div className="t-eyebrow" style={{ color: onDark ? "var(--ember-soft)" : "var(--ember)", ...style }}>{children}</div>
);

const Reveal = ({ children, delay = 0, y = 22, style = {}, as = "div" }) => {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const io = new IntersectionObserver((es) => {
      es.forEach((e) => { if (e.isIntersecting) { setShown(true); io.unobserve(el); } });
    }, { threshold: 0.14, rootMargin: "0px 0px -8% 0px" });
    io.observe(el);
    return () => io.disconnect();
  }, []);
  const Tag = as;
  return (
    <Tag ref={ref} style={{
      opacity: shown ? 1 : 0,
      transform: shown ? "none" : `translateY(${y}px)`,
      transition: `opacity .8s var(--ease) ${delay}s, transform .8s var(--ease) ${delay}s`,
      ...style,
    }}>{children}</Tag>
  );
};

const Container = ({ children, style = {}, narrow = false }) => (
  <div style={{ width: "100%", maxWidth: narrow ? 920 : 1240, margin: "0 auto", padding: "0 clamp(20px, 5vw, 64px)", ...style }}>{children}</div>
);

const scrollToId = (id) => {
  const el = document.getElementById(id);
  if (!el) return;
  const top = el.getBoundingClientRect().top + window.pageYOffset - 64;
  window.scrollTo({ top, behavior: "smooth" });
};

const computePrice = (cfg) => {
  const m = MODELS.find((x) => x.id === cfg.model) || MODELS[0];
  let total = m.base;
  CONFIG.forEach((g) => {
    if (g.showIf && !g.showIf(cfg)) return;
    if (g.multi) {
      cfg[g.key].forEach((id) => { const o = g.options.find((x) => x.id === id); if (o) total += o.price; });
    } else {
      const o = g.options.find((x) => x.id === cfg[g.key]); if (o) total += o.price;
    }
  });
  return total;
};

const shadeHex = (hex, pct) => {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.max(0, Math.min(255, (n >> 16) + Math.round(255 * pct / 100)));
  const g = Math.max(0, Math.min(255, ((n >> 8) & 255) + Math.round(255 * pct / 100)));
  const b = Math.max(0, Math.min(255, (n & 255) + Math.round(255 * pct / 100)));
  return `rgb(${r},${g},${b})`;
};

const optOf = (key, id) => {
  const g = CONFIG.find((c) => c.key === key);
  return g ? g.options.find((o) => o.id === id) : null;
};

const SaunaPreview = ({ cfg }) => {
  const m = MODELS.find((x) => x.id === cfg.model) || MODELS[0];
  const metal = cfg.raam === "metall";
  const frame = metal ? "#3a3d41" : "#6b4f33";
  const frameLo = metal ? "#2a2c2f" : "#4f3a25";

  const varv = (optOf("varvus", cfg.varvus) || {}).color || "#c89a5e";
  const boardFacade = ["tavalaudis", "vaariespuit"].includes(cfg.fassaad);
  const glassy = ["klaas", "peegelklaas", "klaasuks"].includes(cfg.fassaad);

  let facade;
  if (cfg.fassaad === "tavalaudis") {
    const lo = shadeHex(varv, -13);
    facade = `repeating-linear-gradient(90deg, ${varv} 0, ${varv} 12px, ${lo} 12px, ${lo} 14px)`;
  } else if (cfg.fassaad === "vaariespuit") {
    const hi = shadeHex(varv, 10), lo = shadeHex(varv, -12);
    facade = `repeating-linear-gradient(90deg, ${lo} 0, ${varv} 9px, ${hi} 16px, ${varv} 23px, ${lo} 30px)`;
  } else if (cfg.fassaad === "peegelklaas") {
    facade = "linear-gradient(125deg, #b7c1c5 0%, #e8eef0 36%, #93a0a5 56%, #cdd5d8 100%)";
  } else {

/* ── Configurator.jsx ───────────────────────────────────────────────────── */
const optName  = (key, id) => { const g = CONFIG.find((c) => c.key === key); const o = g && g.options.find((x) => x.id === id); return o ? o.name : ""; };
const optPrice = (key, id) => { const g = CONFIG.find((c) => c.key === key); const o = g && g.options.find((x) => x.id === id); return o ? o.price : 0; };

const buildSummary = (cfg) => {
  const m = MODELS.find((x) => x.id === cfg.model) || MODELS[0];
  const items = [
    { label: "Mudel", value: `${m.name} / ${m.sub}`, price: m.base, isBase: true },
    ...CONFIG.filter((g) => !g.multi && (!g.showIf || g.showIf(cfg))).map((g) => ({ label: g.label, value: optName(g.key, cfg[g.key]), price: optPrice(g.key, cfg[g.key]) })),
  ];
  items.push({ label: "Lisad", lisad: cfg.lisad.map((id) => ({ name: optName("lisad", id), price: optPrice("lisad", id) })) });
  return { m, items };
};

const OptionCard = ({ o, selected, onClick }) => {
  const sw = o.color || o.sw;
  return (
    <button onClick={onClick} className="ms-opt" style={{
      textAlign: "left", cursor: "pointer", borderRadius: "var(--r-sm)", padding: "15px 16px",
      background: selected ? "rgba(191,107,60,0.08)" : "var(--bone-2)",
      border: `1.5px solid ${selected ? "var(--ember)" : "var(--line-light)"}`,
      transition: "all .3s var(--ease)", display: "flex", flexDirection: "column", gap: 3, position: "relative"
    }}>
      <span style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
        <span className="t-body-sm" style={{ fontWeight: 600, color: "var(--ink)", display: "inline-flex", alignItems: "center", gap: 10, minWidth: 0 }}>
          {sw && <span aria-hidden="true" style={{
            width: 18, height: 18, borderRadius: "50%", flexShrink: 0, background: sw,
            border: "1.5px solid rgba(31,28,26,0.14)", boxShadow: "inset 0 1px 2.5px rgba(0,0,0,0.28)"
          }} />}
          <span>
            {o.name}
            {o.price > 0 && <span style={{ color: "var(--ember)", fontWeight: 500, marginLeft: 7, whiteSpace: "nowrap" }}>{eurDelta(o.price)}</span>}
          </span>
        </span>
        <span style={{
          width: 19, height: 19, borderRadius: "50%", flexShrink: 0,
          background: selected ? "var(--ember)" : "transparent",
          border: selected ? "none" : "1.5px solid var(--ink-faint)",
          display: "flex", alignItems: "center", justifyContent: "center"
        }}>{selected && <ICheck s={12} c="var(--on-ember)" sw={2.4} />}</span>
      </span>
      <span className="t-caption" style={{ color: "var(--ink-soft)" }}>{o.note}</span>
    </button>
  );
};

const OptionGroup = ({ group, value, onPick }) => (
  <div style={{ marginBottom: 30 }}>
    <div className="t-label" style={{ color: "var(--ink-faint)", marginBottom: 14 }}>{group.label}</div>
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(165px, 1fr))", gap: 10 }}>
      {group.options.map((o) => {
        const sel = group.multi ? value.includes(o.id) : value === o.id;
        return <OptionCard key={o.id} o={o} selected={sel} onClick={() => onPick(group, o.id)} />;
      })}
    </div>
  </div>
);

const Configurator = ({ cfg, setCfg }) => {
  const [formOpen, setFormOpen] = useState(false);
  const m = MODELS.find((x) => x.id === cfg.model) || MODELS[0];
  const pick = (group, id) => {
    if (group.multi) {
      setCfg((c) => ({ ...c, [group.key]: c[group.key].includes(id) ? c[group.key].filter((x) => x !== id) : [...c[group.key], id] }));
    } else {
      setCfg((c) => ({ ...c, [group.key]: id }));
    }
  };

  return (
    <section id="konfigureeri" style={{ background: "var(--bone)", padding: "clamp(80px,12vh,140px) 0" }}>
      <Container>
        <div style={{ marginBottom: "clamp(36px,5vh,56px)", maxWidth: 640 }}>
          <Reveal><Eyebrow style={{ marginBottom: 22 }}>Konfigureerimistööriist</Eyebrow></Reveal>
          <Reveal delay={0.06}>
            <h2 className="t-h1" style={{ color: "var(--ink)" }}>Kujunda oma <span className="t-italic" style={{ color: "var(--ember)" }}>saun</span>.</h2>
          </Reveal>
        </div>

        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 32 }}>
          {MODELS.map((mm) => {
            const sel = mm.id === cfg.model;
            return (
              <button key={mm.id} onClick={() => setCfg((c) => ({ ...c, model: mm.id }))} style={{
                cursor: "pointer", borderRadius: "var(--r-pill)", padding: "10px 20px",
                background: sel ? "var(--ink)" : "transparent", color: sel ? "var(--bone)" : "var(--ink-soft)",
                border: `1px solid ${sel ? "var(--ink)" : "var(--line-light)"}`,
                fontFamily: "var(--font-body)", fontSize: 14.5, fontWeight: 600, transition: "all .3s var(--ease)"
              }}>{mm.name} <span style={{ opacity: 0.6, fontStyle: "italic", fontWeight: 500 }}>/ {mm.sub}</span></button>
            );
          })}
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr", gap: "clamp(28px,4vw,56px)", alignItems: "start" }} className="ms-config-grid">
          <div>
            <div style={{ display: "flex", gap: 22, padding: "0 0 28px", marginBottom: 30, borderBottom: "1px solid var(--line-light)" }} className="ms-modelinfo">
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", alignItems: "baseline", gap: 10, marginBottom: 12 }}>
                  <h3 className="t-h2" style={{ color: "var(--ink)", fontSize: 34 }}>{m.name}</h3>
                  <span className="t-h3" style={{ color: "var(--ink-faint)", fontStyle: "italic", fontWeight: 500, fontSize: 22 }}>/ {m.sub}</span>
                </div>
                <div style={{ display: "flex", gap: 18, flexWrap: "wrap", marginBottom: 16 }}>
                  {[["Suurus", `${m.size} mm`], ["Pind", m.area], ["Ruumid", m.rooms]].map(([l, v]) =>
                    <div key={l}>
                      <div className="t-label" style={{ color: "var(--ink-faint)", fontSize: 10, marginBottom: 4 }}>{l}</div>
                      <div className="t-body-sm" style={{ color: "var(--ink)", fontWeight: 600 }}>{v}</div>
                    </div>
                  )}
                </div>
                <p className="t-body-sm" style={{ color: "var(--ink-soft)" }}>{m.desc}</p>
              </div>
            </div>

            {CONFIG.map((g) =>
              (!g.showIf || g.showIf(cfg)) ?
              <OptionGroup key={g.key} group={g} value={cfg[g.key]} onPick={pick} /> : null
            )}
          </div>

          <SummaryPanel cfg={cfg} onRequest={() => setFormOpen(true)} />
        </div>
      </Container>

      {formOpen && <QuoteModal cfg={cfg} onClose={() => setFormOpen(false)} />}
    </section>
  );
};

const Field = ({ label, type = "text", value, onChange, required, placeholder, textarea }) => {
  const [focus, setFocus] = useState(false);
  const base = {
    width: "100%", fontFamily: "var(--font-body)", fontSize: 15.5, color: "var(--ink)",
    background: "var(--bone)", borderRadius: "var(--r-sm)", padding: "13px 15px",
    border: `1.5px solid ${focus ? "var(--ember)" : "var(--line-light)"}`,
    outline: "none", transition: "border-color .25s", resize: "vertical", boxSizing: "border-box",
  };
  return (
    <label style={{ display: "block" }}>
      <span className="t-label" style={{ color: "var(--ink-faint)", fontSize: 10.5, display: "block", marginBottom: 8 }}>
        {label}{required && <span style={{ color: "var(--ember)" }}> *</span>}
      </span>
      {textarea ? (
        <textarea rows={3} value={value} required={required} placeholder={placeholder}
          onFocus={() => setFocus(true)} onBlur={() => setFocus(false)}
          onChange={(e) => onChange(e.target.value)} style={base} />
      ) : (
        <input type={type} value={value} required={required} placeholder={placeholder}
          onFocus={() => setFocus(true)} onBlur={() => setFocus(false)}
          onChange={(e) => onChange(e.target.value)} style={base} />
      )}
    </label>
  );
};

          </div>

          <div style={{ padding: "clamp(40px,6vw,64px) clamp(26px,4vw,40px)", textAlign: "center" }}>
            <div style={{ width: 68, height: 68, borderRadius: "50%", background: "var(--ember)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 24px" }}>
              <ICheck s={34} c="var(--on-ember)" sw={2.2} />
            </div>
            <h3 className="t-h2" style={{ color: "var(--ink)", fontSize: "clamp(28px,4vw,40px)", marginBottom: 14 }}>Aitäh{f.nimi ? `, ${f.nimi.split(" ")[0]}` : ""}!</h3>
            <p className="t-body" style={{ color: "var(--ink-soft)", maxWidth: 380, margin: "0 auto 30px" }}>
              Sinu päring <strong style={{ color: "var(--ink)", fontWeight: 600 }}>{m.name} / {m.sub}</strong> saunamajale on kohal. Võtame ühendust 1 tööpäeva jooksul.
            </p>
            <Button variant="ghost" onClick={onClose}>Sulge</Button>
          </div>
        )}
      </div>
    </div>
  );
};

/* ── Gallery.jsx ────────────────────────────────────────────────────────── */
const TILES = [
  { src: RES("assets/photos/coast-juniper-golden.webp"), cap: "Undva, rannakadakad", pos: "50% 58%" },
  { src: RES("assets/photos/forest.jpg"),                cap: "Saaremaa mänd",       pos: "50% 50%" },
  { src: RES("assets/photos/juniper-macro.jpg"),         cap: "Kadakas lähedalt",    pos: "50% 50%" },
  { src: RES("assets/photos/juniper-sea.jpg"),           cap: "Vilsandi vaade",      pos: "50% 60%" },
  { src: RES("assets/photos/coast-aerial.jpg"),          cap: "Panga pank",          pos: "50% 85%" },
];

const GalleryTile = ({ t, i, onOpen }) => (
  <Reveal delay={i % 3 * 0.06}>
    <div className="ms-gtile" onClick={() => onOpen(i)} style={{ position: "relative", aspectRatio: "4 / 3", borderRadius: "var(--r-md)", overflow: "hidden", cursor: "pointer" }}>
      <img src={t.src} alt={t.cap} style={{ width: "100%", height: "100%", objectFit: "cover", objectPosition: t.pos }} />
      <div style={{ position: "absolute", inset: 0, background: "linear-gradient(180deg, transparent 50%, rgba(15,24,21,0.6) 100%)" }} />
      <span className="t-label" style={{ position: "absolute", top: 14, left: 14, padding: "5px 10px", borderRadius: "var(--r-pill)", background: "var(--glass-dark)", backdropFilter: "var(--glass-blur)", WebkitBackdropFilter: "var(--glass-blur)", border: "1px solid var(--glass-line)", color: "var(--on-dark-soft)", fontSize: 9.5 }}>Näidis</span>
      <span className="t-caption" style={{ position: "absolute", left: 16, bottom: 14, color: "var(--on-dark)", fontWeight: 500 }}>{t.cap}</span>
      <span className="ms-gtile-zoom" style={{ position: "absolute", top: 12, right: 12, width: 34, height: 34, borderRadius: "50%", background: "var(--glass-dark)", backdropFilter: "var(--glass-blur)", WebkitBackdropFilter: "var(--glass-blur)", border: "1px solid var(--glass-line)", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--on-dark)" }}><IPlus s={16} /></span>
    </div>
  </Reveal>
);

const Lightbox = ({ index, onClose, onPrev, onNext }) => {
  const t = TILES[index];
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "Escape")     onClose();
      else if (e.key === "ArrowLeft")  onPrev();
      else if (e.key === "ArrowRight") onNext();
    };
    document.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => { document.removeEventListener("keydown", onKey); document.body.style.overflow = ""; };
  }, [onClose, onPrev, onNext]);

  const navBtn = {
    width: 52, height: 52, borderRadius: "50%", flexShrink: 0, cursor: "pointer",
    background: "var(--glass-dark)", backdropFilter: "var(--glass-blur)", WebkitBackdropFilter: "var(--glass-blur)",
    border: "1px solid var(--glass-line)", color: "var(--on-dark)",
    display: "flex", alignItems: "center", justifyContent: "center",
  };

  return (
    <div onClick={onClose} style={{
      position: "fixed", inset: 0, zIndex: 300, background: "rgba(9,15,13,0.82)",
      backdropFilter: "blur(8px)", WebkitBackdropFilter: "blur(8px)",
      display: "flex", flexDirection: "column", animation: "ms-fade .3s var(--ease)",
    }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "20px clamp(16px,4vw,40px)", flexShrink: 0 }}>
        <span className="t-label" style={{ color: "var(--on-dark-soft)" }}>{String(index + 1).padStart(2, "0")} / {String(TILES.length).padStart(2, "0")}</span>
        <button onClick={onClose} aria-label="Sulge" style={{ ...navBtn, width: 44, height: 44 }}><IClose s={20} /></button>
      </div>

      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: "clamp(8px,2vw,28px)", padding: "0 clamp(12px,3vw,40px)", minHeight: 0 }}>
        <button className="ms-press" onClick={(e) => { e.stopPropagation(); onPrev(); }} aria-label="Eelmine" style={navBtn}><IArrow s={22} style={{ transform: "rotate(180deg)" }} /></button>

        <figure onClick={(e) => e.stopPropagation()} style={{ margin: 0, display: "flex", flexDirection: "column", alignItems: "center", maxWidth: "min(1100px, 86vw)", maxHeight: "100%", minHeight: 0 }}>
          <div style={{ position: "relative", borderRadius: "var(--r-lg)", overflow: "hidden", boxShadow: "var(--shadow-lg)", minHeight: 0 }}>
            <img key={t.src} src={t.src} alt={t.cap} style={{ display: "block", maxWidth: "100%", maxHeight: "72vh", objectFit: "contain", animation: "ms-fade .35s var(--ease)" }} />
            <div style={{ position: "absolute", inset: 0, background: "linear-gradient(180deg, transparent 62%, rgba(15,24,21,0.7) 100%)", pointerEvents: "none" }} />
            <div style={{ position: "absolute", left: 0, right: 0, bottom: 0, padding: "20px 24px", display: "flex", alignItems: "flex-end", justifyContent: "space-between", gap: 16 }}>
              <span className="t-h3" style={{ color: "var(--on-dark)", fontSize: "clamp(20px,2.4vw,28px)", fontStyle: "italic", fontWeight: 500 }}>{t.cap}</span>
              <span className="t-label" style={{ color: "var(--on-dark-soft)", fontSize: 10, padding: "5px 11px", borderRadius: "var(--r-pill)", background: "var(--glass-dark)", border: "1px solid var(--glass-line)", whiteSpace: "nowrap" }}>Näidis</span>
            </div>
          </div>
        </figure>

        <button className="ms-press" onClick={(e) => { e.stopPropagation(); onNext(); }} aria-label="Järgmine" style={navBtn}><IArrow s={22} /></button>
      </div>

      <div onClick={(e) => e.stopPropagation()} style={{ display: "flex", gap: 10, justifyContent: "center", padding: "18px clamp(16px,4vw,40px) 28px", flexWrap: "wrap", flexShrink: 0 }}>
        {TILES.map((th, i) => (
          <button key={th.src} onClick={() => onNext(i)} aria-label={th.cap} style={{
            width: 64, height: 44, borderRadius: 8, overflow: "hidden", cursor: "pointer", padding: 0,
            border: i === index ? "2px solid var(--ember-soft)" : "2px solid transparent",
            opacity: i === index ? 1 : 0.5, transition: "all .3s var(--ease)",
          }}>
            <img src={th.src} alt="" style={{ width: "100%", height: "100%", objectFit: "cover", objectPosition: th.pos }} />
          </button>
        ))}
      </div>
    </div>
  );
};

const Gallery = () => {
  const [open, setOpen] = useState(null);
  const show  = (i) => setOpen(i);
  const close = ()  => setOpen(null);
  const prev  = ()  => setOpen((i) => (i + TILES.length - 1) % TILES.length);
  const next  = (i) => setOpen((cur) => (typeof i === "number" ? i : (cur + 1) % TILES.length));

  return (
    <section id="tood" style={{ background: "var(--bone)", padding: "clamp(80px,12vh,140px) 0" }}>
      <Container>
        <div style={{ maxWidth: 620, marginBottom: "clamp(36px,5vh,56px)" }}>
          <Reveal><Eyebrow style={{ marginBottom: 22 }}>Tehtud tööd</Eyebrow></Reveal>
          <Reveal delay={0.06}>
            <h2 className="t-h1" style={{ color: "var(--ink)", marginBottom: 18 }}>Maastik, mis meid <span className="t-italic" style={{ color: "var(--ember)" }}>kujundab</span>.</h2>
          </Reveal>
          <Reveal delay={0.12}>
            <p className="t-body" style={{ color: "var(--ink-soft)" }}>
              Esimesed saunamajad valmivad hooajal 2026. Seni galeriis Saaremaa ise — kadakad, mänd ja meri, mille järgi iga Moo Sviit saun oma toonid ja hinge saab. Vajuta pildile, et seda suuremalt vaadata.
            </p>
          </Reveal>
        </div>

        <div className="ms-gallery" style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: "clamp(12px,1.6vw,18px)" }}>
          {TILES.map((t, i) => <GalleryTile key={t.src} t={t} i={i} onOpen={show} />)}
          <Reveal delay={0.12}>
            <div style={{ height: "100%", aspectRatio: "4 / 3", borderRadius: "var(--r-md)", background: "var(--night)", padding: "26px 24px", display: "flex", flexDirection: "column", justifyContent: "space-between" }}>
              <ILeaf s={24} c="var(--ember-soft)" />
              <div>
                <h3 className="t-h3" style={{ color: "var(--on-dark)", fontSize: 24, marginBottom: 14 }}>Sinu projekt <span style={{ fontStyle: "italic", color: "var(--ember-soft)" }}>järgmisena?</span></h3>
                <span onClick={() => scrollToId("konfigureeri")} style={{ display: "inline-flex", alignItems: "center", gap: 7, color: "var(--ember-soft)", fontWeight: 600, fontSize: 14.5, cursor: "pointer" }}>Alusta konfigureerimist <IArrow s={16} c="var(--ember-soft)" /></span>
              </div>
            </div>
          </Reveal>
        </div>
      </Container>

      {open !== null && <Lightbox index={open} onClose={close} onPrev={prev} onNext={next} />}
    </section>
  );
};
